[database]
# Update these values on each desktop installation, or set SHOPSYNC_DB_* env vars.
driver = ODBC Driver 17 for SQL Server
server = localhost\SQLEXPRESS
database = ShopSyncDB
trusted_connection = yes
# Leave username/password empty to use Windows authentication.
username =
password =

[authentication]
# Created only when the Users table has no accounts. Change before first launch.
initial_admin_username = admin
initial_admin_password = Change_ME
